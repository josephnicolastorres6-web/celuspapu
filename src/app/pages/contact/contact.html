<div class="contact-container">

  <h1 class="section-title fade-in-down">Contáctanos 🗿</h1>

  <div class="content-wrapper">
    
    <div class="image-section fade-in-left">
      <img src="logo1.jpg" alt="Moai Contacto" class="moai-contact floating">
    </div>

    <div class="form-section fade-in-right">
      <form class="form-papu">
        
        <h3 class="form-title">¡Hablemos!</h3>
        
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="¿Cómo te llamas, crack?" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tucorreo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label>Mensaje</label>
          <textarea rows="4" placeholder="Cuéntanos qué celular buscas..." required></textarea>
        </div>

        <button type="submit" class="btn-enviar">
          ENVIAR MENSAJE 🚀
        </button>

      </form>
    </div>

  </div>

</div>
