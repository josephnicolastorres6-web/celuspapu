<div class="contact-container">

  <h1 class="section-title fade-in-down">Contáctanos 🗿</h1>

  <div class="content-wrapper">
    
    <div class="image-section fade-in-left">
      <img src="logo1.jpg" alt="Celus Papu" class="moai-contact floating">
    </div>

    <div class="form-section fade-in-right">
      
      @if (mensajeEnviado) {
        <div class="alerta-exito fade-in-up">
          <div class="icono-exito">✅</div>
          <h3>¡Mensaje enviado, crack!</h3>
          <p>Pronto un asesor insano se pondrá en contacto contigo.</p>
        </div>
      } 
      @else {
        <form #contactoForm="ngForm" (ngSubmit)="enviarFormulario(contactoForm)" class="form-papu">
          
          <div class="form-row">
            <div class="form-group half-width">
              <label>Nombre Completo</label>
              <input type="text" name="nombre" ngModel required minlength="3" placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group half-width">
              <label>Teléfono (WhatsApp)</label>
              <input type="tel" name="telefono" ngModel required pattern="[0-9]+" placeholder="Ej. 300 123 4567">
            </div>
          </div>

          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" ngModel required email placeholder="tucorreo@ejemplo.com">
          </div>

          <div class="form-group">
            <label>¿En qué te podemos ayudar?</label>
            <select name="asunto" ngModel required class="select-papu">
              <option value="" disabled selected>Selecciona una opción...</option>
              <option value="comprar">Quiero comprar un celular</option>
              <option value="asesoria">Necesito asesoría para elegir</option>
              <option value="garantia">Tema de garantía o soporte</option>
              <option value="otro">Otro asunto</option>
            </select>
          </div>

          <div class="form-group">
            <label>Tu Mensaje</label>
            <textarea name="mensaje" ngModel required rows="4" placeholder="Cuéntanos los detalles..."></textarea>
          </div>

          <button type="submit" class="btn-enviar" [disabled]="contactoForm.invalid">
            ENVIAR MENSAJE 🚀
          </button>

        </form>
      }

    </div>
  </div>
</div>
